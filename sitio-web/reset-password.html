<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santaglia Compass · Nueva contraseña</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); margin:0; }
    .login-wrap { width:100%; max-width:400px; padding:1.5rem; }
    .login-card { background:var(--bg-white); border:1.5px solid var(--border); border-radius:14px; padding:2.25rem 2rem; box-shadow:var(--shadow-md); }
    .login-logo { text-align:center; margin-bottom:1.25rem; }
    .login-logo img { height:44px; }
    .login-title { font-family:var(--brand); font-size:1rem; font-weight:800; color:var(--navy); text-align:center; letter-spacing:0.04em; margin-bottom:0.2rem; }
    .login-subtitle { font-size:0.72rem; color:var(--text-dim); text-align:center; margin-bottom:1.75rem; }
    .login-field { margin-bottom:1rem; }
    .login-field label { display:block; font-size:0.68rem; font-weight:700; color:var(--text-dim); letter-spacing:0.07em; text-transform:uppercase; margin-bottom:0.35rem; }
    .login-field input { width:100%; padding:0.6rem 0.8rem; border:1.5px solid var(--border); border-radius:var(--radius); font-size:0.85rem; color:var(--text); background:var(--bg); box-sizing:border-box; transition:border-color 150ms; }
    .login-field input:focus { outline:none; border-color:var(--navy); }
    .login-btn { width:100%; padding:0.7rem; background:var(--navy); color:#fff; border:none; border-radius:var(--radius); font-family:var(--brand); font-size:0.8rem; font-weight:800; letter-spacing:0.08em; cursor:pointer; margin-top:0.5rem; transition:opacity 150ms; }
    .login-btn:hover { opacity:0.88; }
    .login-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .login-msg { border-radius:var(--radius); padding:0.55rem 0.8rem; font-size:0.72rem; margin-top:0.9rem; display:none; }
    .login-msg.error   { background:#fef2f2; border:1px solid #fecaca; color:var(--red); }
    .login-msg.success { background:#f0faf4; border:1px solid #86efac; color:#15803d; }
    .login-badge { display:flex; align-items:center; justify-content:center; gap:0.4rem; font-size:0.62rem; color:var(--text-xs); margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/logo-color.png" alt="Santaglia Compass" />
    </div>
    <div class="login-title">SANTAGLIA COMPASS</div>
    <div class="login-subtitle">Crea tu nueva contraseña</div>

    <form id="reset-form" onsubmit="handleReset(event)">
      <div class="login-field">
        <label>Nueva contraseña</label>
        <input type="password" id="f-pass" placeholder="Mínimo 6 caracteres"
               required minlength="6" autocomplete="new-password" />
      </div>
      <div class="login-field">
        <label>Confirmar contraseña</label>
        <input type="password" id="f-pass2" placeholder="Repite la contraseña"
               required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="login-btn" id="reset-btn">GUARDAR CONTRASEÑA</button>
      <div class="login-msg" id="reset-msg"></div>
    </form>

    <div class="login-badge">
      🔒 Acceso seguro · datos cifrados en Supabase (São Paulo)
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const _SB_URL = 'https://vblazgxsyidxttobiszt.supabase.co';
  const _SB_KEY = 'sb_publishable_T6iu_Tk9mxxXdBMngfqE8A_hPCH4cXA';
  const sb = supabase.createClient(_SB_URL, _SB_KEY);

  let sessionReady = false;

  function showMsg(text, type) {
    const el = document.getElementById('reset-msg');
    el.className = 'login-msg' + (type ? ' ' + type : '');
    el.textContent = text;
    el.style.display = text ? 'block' : 'none';
  }

  // ── Establecer sesión desde el enlace ──
  // Supabase v2 usa PKCE: el enlace trae ?code=... en la URL
  // También escuchamos el evento PASSWORD_RECOVERY por si usa hash (#access_token=...)
  (async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (code) {
      // Flujo PKCE (Supabase v2 moderno)
      const { error } = await sb.auth.exchangeCodeForSession(code);
      if (error) {
        showMsg('El enlace expiró o ya fue usado. Solicita uno nuevo desde el login.', 'error');
        document.getElementById('reset-btn').disabled = true;
      } else {
        sessionReady = true;
      }
    } else {
      // Flujo legacy con hash fragment
      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY' && session) {
          sessionReady = true;
        }
      });
      // Esperar brevemente por si el cliente detecta sesión del hash automáticamente
      await new Promise(r => setTimeout(r, 800));
      const { data } = await sb.auth.getSession();
      if (data?.session) sessionReady = true;

      if (!sessionReady) {
        showMsg('No se detectó sesión de recuperación. Usa el enlace del correo directamente.', 'error');
        document.getElementById('reset-btn').disabled = true;
      }
    }
  })();

  async function handleReset(e) {
    e.preventDefault();
    const pass  = document.getElementById('f-pass').value;
    const pass2 = document.getElementById('f-pass2').value;
    const btn   = document.getElementById('reset-btn');

    if (pass !== pass2) {
      showMsg('Las contraseñas no coinciden.', 'error');
      return;
    }

    if (!sessionReady) {
      showMsg('Sesión no lista. Usa el enlace del correo y no lo abras en una pestaña nueva.', 'error');
      return;
    }

    btn.disabled = true; btn.textContent = 'Guardando…';

    try {
      const { error } = await sb.auth.updateUser({ password: pass });
      if (error) throw error;
      showMsg('✓ Contraseña actualizada. Redirigiendo…', 'success');
      setTimeout(() => location.href = 'login.html', 2000);
    } catch(err) {
      const msg = (err.message?.includes('session') || err.message?.includes('expired'))
        ? 'El enlace expiró o ya fue usado. Solicita uno nuevo desde el login.'
        : err.message?.includes('different from the old password')
        ? 'La nueva contraseña debe ser diferente a la anterior.'
        : err.message?.includes('at least')
        ? 'La contraseña debe tener al menos 6 caracteres.'
        : `Error: ${err.message}`;
      showMsg(msg, 'error');
      btn.disabled = false; btn.textContent = 'GUARDAR CONTRASEÑA';
    }
  }
</script>
</body>
</html>

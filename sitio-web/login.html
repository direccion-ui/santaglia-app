<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santaglia Compass · Acceso</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      margin: 0;
    }
    .login-wrap { width: 100%; max-width: 400px; padding: 1.5rem; }

    .login-card {
      background: var(--bg-white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 2.25rem 2rem;
      box-shadow: var(--shadow-md);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .login-logo img { height: 44px; }

    .login-title {
      font-family: var(--brand);
      font-size: 1rem;
      font-weight: 800;
      color: var(--navy);
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 0.2rem;
    }
    .login-subtitle {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .login-field { margin-bottom: 1rem; }
    .login-field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      color: var(--text);
      background: var(--bg);
      box-sizing: border-box;
      transition: border-color 150ms;
    }
    .login-field input:focus {
      outline: none;
      border-color: var(--navy);
    }

    .login-btn {
      width: 100%;
      padding: 0.7rem;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--brand);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 150ms;
    }
    .login-btn:hover   { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .login-msg {
      border-radius: var(--radius);
      padding: 0.55rem 0.8rem;
      font-size: 0.72rem;
      margin-top: 0.9rem;
      display: none;
    }
    .login-msg.error   { background:#fef2f2; border:1px solid #fecaca; color:var(--red); }
    .login-msg.success { background:#f0faf4; border:1px solid #86efac; color:#15803d; }

    .login-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.68rem;
      color: var(--text-xs);
    }
    .login-footer button {
      background: none;
      border: none;
      color: var(--navy);
      font-size: 0.68rem;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .login-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.62rem;
      color: var(--text-xs);
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <img src="assets/logo-color.png" alt="Santaglia Compass" />
    </div>
    <div class="login-title">SANTAGLIA COMPASS</div>
    <div class="login-subtitle" id="login-subtitle">Ingresa con tu cuenta para continuar</div>

    <form id="login-form" onsubmit="handleAuth(event)" autocomplete="on">
      <div class="login-field">
        <label>Correo electrónico</label>
        <input type="email" id="f-email" placeholder="correo@empresa.com"
               required autocomplete="email" />
      </div>
      <div class="login-field">
        <label>Contraseña</label>
        <input type="password" id="f-pass" placeholder="••••••••"
               required autocomplete="current-password" minlength="6" />
      </div>
      <button type="submit" class="login-btn" id="login-btn">INICIAR SESIÓN</button>
      <div class="login-msg" id="login-msg"></div>
    </form>

    <div class="login-footer">
      <button id="toggle-btn" onclick="toggleMode()">¿Primera vez? Crear cuenta</button>
      <button id="forgot-btn" onclick="toggleForgot()" style="display:block;width:100%;text-align:center;margin-top:0.4rem;">¿Olvidaste tu contraseña?</button>
    </div>

    <div class="login-badge">
      🔒 Acceso seguro · datos cifrados en Supabase (São Paulo)
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const _SB_URL = 'https://vblazgxsyidxttobiszt.supabase.co';
  const _SB_KEY = 'sb_publishable_T6iu_Tk9mxxXdBMngfqE8A_hPCH4cXA';
  const sb = supabase.createClient(_SB_URL, _SB_KEY);

  let isSignUp = false;

  // Si ya hay sesión activa con usuario válido → ir al dashboard
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session?.user?.id) location.href = 'dashboard.html';
  });

  function toggleMode() {
    isSignUp = !isSignUp;
    const btn = document.getElementById('login-btn');
    const sub = document.getElementById('login-subtitle');
    const tog = document.getElementById('toggle-btn');
    const inp = document.getElementById('f-pass');
    if (isSignUp) {
      sub.textContent  = 'Crea tu cuenta para empezar';
      btn.textContent  = 'CREAR CUENTA';
      tog.textContent  = '¿Ya tienes cuenta? Iniciar sesión';
      inp.autocomplete = 'new-password';
    } else {
      sub.textContent  = 'Ingresa con tu cuenta para continuar';
      btn.textContent  = 'INICIAR SESIÓN';
      tog.textContent  = '¿Primera vez? Crear cuenta';
      inp.autocomplete = 'current-password';
    }
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('login-msg');
    el.className = 'login-msg' + (type ? ' ' + type : '');
    el.textContent = text;
    el.style.display = text ? 'block' : 'none';
  }

  /* ── Flujo "Olvidé mi contraseña" ── */
  let isForgot = false;

  function toggleForgot() {
    isForgot = !isForgot;
    const passField = document.getElementById('f-pass').closest('.login-field');
    const btn       = document.getElementById('login-btn');
    const sub       = document.getElementById('login-subtitle');
    const toggleBtn = document.getElementById('toggle-btn');
    const forgotBtn = document.getElementById('forgot-btn');
    const passInput = document.getElementById('f-pass');

    if (isForgot) {
      passField.style.display = 'none';
      passInput.removeAttribute('required');
      passInput.value         = '';           // limpiar autofill
      btn.textContent         = 'ENVIAR ENLACE';
      sub.textContent         = 'Te enviamos un enlace para restablecer tu contraseña';
      toggleBtn.style.display = 'none';
      forgotBtn.textContent   = '← Volver al inicio de sesión';
    } else {
      passField.style.display = '';
      passInput.setAttribute('required', '');
      btn.textContent         = isSignUp ? 'CREAR CUENTA' : 'INICIAR SESIÓN';
      sub.textContent         = 'Ingresa con tu cuenta para continuar';
      toggleBtn.style.display = '';
      forgotBtn.textContent   = '¿Olvidaste tu contraseña?';
    }
    showMsg('', '');
  }

  async function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('f-email').value.trim();
    const btn   = document.getElementById('login-btn');
    showMsg('', '');

    // ── Modo: recuperar contraseña ──
    if (isForgot) {
      btn.disabled = true; btn.textContent = 'Enviando…';
      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://santaglia.app/reset-password.html'
        });
        if (error) throw error;
        showMsg('✓ Enlace enviado. Revisa tu bandeja de entrada (y spam).', 'success');
      } catch(err) {
        showMsg('No se pudo enviar el enlace. Verifica el correo e intenta de nuevo.', 'error');
      }
      btn.disabled = false; btn.textContent = 'ENVIAR ENLACE';
      return;
    }

    // ── Modo: login / registro ──
    const pass = document.getElementById('f-pass').value;
    btn.disabled = true; btn.textContent = 'Verificando…';

    try {
      let result;
      if (isSignUp) {
        result = await sb.auth.signUp({ email, password: pass });
      } else {
        result = await sb.auth.signInWithPassword({ email, password: pass });
      }

      const { data, error } = result;

      if (error) {
        const msg = error.message.includes('Invalid login credentials')
          ? 'Correo o contraseña incorrectos. Verifica e intenta de nuevo.'
          : error.message.includes('already registered')
          ? 'Este correo ya tiene cuenta. Usa "Iniciar sesión".'
          : error.message;
        showMsg(msg, 'error');
        btn.disabled    = false;
        btn.textContent = isSignUp ? 'CREAR CUENTA' : 'INICIAR SESIÓN';
        return;
      }

      if (isSignUp && !data.session) {
        showMsg('Cuenta creada. Revisa tu correo para confirmar y luego inicia sesión.', 'success');
        btn.disabled    = false;
        btn.textContent = 'INICIAR SESIÓN';
        isSignUp = false;
        document.getElementById('toggle-btn').textContent = '¿Primera vez? Crear cuenta';
        document.getElementById('login-subtitle').textContent = 'Ingresa con tu cuenta para continuar';
        return;
      }

      location.href = 'dashboard.html';

    } catch(err) {
      showMsg('Error de conexión. Verifica tu internet e intenta de nuevo.', 'error');
      btn.disabled    = false;
      btn.textContent = isSignUp ? 'CREAR CUENTA' : 'INICIAR SESIÓN';
    }
  }
</script>
</body>
</html>
